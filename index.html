<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,0.2);
width:320px;
color:white;
animation:zoom 1s;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

input{
padding:12px;
width:90%;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h1>✨ Welcome ✨</h1>

<input type="text" id="name" placeholder="Enter Your Name">

<br>

<button onclick="welcomeUser()">Enter</button>

<div id="result"></div>

<audio id="bgMusic">
<source src="Mahadev_status_video_💫_bholenath_status_☘️_mahakal_status__mahadev__shorts__god_MP3_256kbps_128k.mp3" type="audio/mpeg">
</audio>

</div>

<script>
function welcomeUser(){

let name=document.getElementById("name").value;

document.getElementById("result").innerHTML=
"🎉 Welcome, <b>"+name+"</b>!<br><br>🚀 Thanks for visiting this website.";

document.getElementById("bgMusic").play();

}
</script>

</body>
</html>
